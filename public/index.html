<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Journal Cal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">📓 Journal Cal</div>

      <div class="filters">
        <div class="filter-label">Filter</div>
        <button class="filter-btn active" data-filter="all">All Events</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <div class="filters">
        <div class="filter-label">Tags</div>
        <div id="tag-list"></div>
      </div>

      <div class="search-wrap">
        <input id="search" type="text" placeholder="Search…" />
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="top-bar">
        <h1>Event Log</h1>
        <button class="btn-primary" id="new-btn">+ New Entry</button>
      </div>

      <div id="event-list" class="event-list"></div>
    </main>

  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title">New Entry</h2>
        <button id="modal-close">✕</button>
      </div>
      <form id="event-form">
        <input type="hidden" id="edit-id" />
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="f-title" required placeholder="What's happening?" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="f-date" required />
          </div>
          <div class="form-group">
            <label>Time <span class="opt">(optional)</span></label>
            <input type="time" id="f-time" />
          </div>
        </div>
        <div class="form-group">
          <label>Tags <span class="opt">(comma-separated)</span></label>
          <input type="text" id="f-tag" placeholder="e.g. work, health, travel" />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="f-status">
            <option value="active">Active / Ongoing</option>
            <option value="completed">Completed</option>
            <option value="paused">Paused</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="f-notes" rows="5" placeholder="Log notes, context, details…"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="cancel-btn">Cancel</button>
          <button type="submit" class="btn-primary">Save Entry</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
