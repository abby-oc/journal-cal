<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trade Journal</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">📒 Trade Journal</div>

    <div class="stat-cards" id="stat-cards"></div>

    <div class="view-toggle">
      <button class="view-btn active" id="view-trades-btn" onclick="setView('trades')">📒 Trades</button>
      <button class="view-btn" id="view-log-btn" onclick="setView('log')">🧠 System Log</button>
    </div>

    <div id="trade-sidebar-section">
    <div class="filters">
      <div class="filter-label">Status</div>
      <button class="filter-btn active" data-filter="all">All Trades</button>
      <button class="filter-btn" data-filter="planned">Planned</button>
      <button class="filter-btn" data-filter="open">Open</button>
      <button class="filter-btn" data-filter="closed">Closed</button>
      <button class="filter-btn" data-filter="cancelled">Cancelled</button>
    </div>

    <div class="filters">
      <div class="filter-label">Symbol</div>
      <div id="symbol-filters"></div>
    </div>

    <div class="filters">
      <div class="filter-label">Error Category</div>
      <div id="error-filters"></div>
    </div>

    <div class="search-wrap">
      <input id="search" type="text" placeholder="Search thesis, notes…"/>
    </div>
    </div><!-- /trade-sidebar-section -->
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Trade Log view -->
    <div id="view-trades">
      <div class="top-bar">
        <div>
          <h1>Trade Log</h1>
          <div id="pnl-summary" class="pnl-summary"></div>
        </div>
        <button class="btn-primary" id="new-btn">+ Log Trade</button>
      </div>
      <div id="trade-list" class="trade-list"></div>
    </div>

    <!-- System Log view -->
    <div id="view-log" style="display:none">
      <div class="top-bar">
        <div>
          <h1>System Log</h1>
          <div class="pnl-summary" id="log-subtitle">Abby's analysis &amp; decisions</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="log-type-filter" onchange="loadSystemLog()" style="background:#22263a;color:#e2e6f0;border:1px solid #2e3350;padding:6px 10px;border-radius:6px;font-size:0.85rem">
            <option value="">All types</option>
            <option value="insight">Insights</option>
            <option value="decision">Decisions</option>
            <option value="alert">Alerts</option>
            <option value="experiment">Experiments</option>
            <option value="status">Status</option>
          </select>
          <button class="btn-primary" onclick="loadSystemLog()">↻ Refresh</button>
        </div>
      </div>
      <div id="system-log-list" class="trade-list"></div>
    </div>
  </main>

</div>

<!-- Modal -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modal-title">Log Trade</h2>
      <button id="modal-close">✕</button>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar" id="tab-bar">
      <button class="tab active" data-tab="plan">📋 Plan</button>
      <button class="tab" data-tab="outcome">📊 Outcome</button>
      <button class="tab" data-tab="analysis">🧠 Analysis</button>
    </div>

    <form id="trade-form">
      <input type="hidden" id="edit-id"/>

      <!-- ── Tab: Plan ── -->
      <div class="tab-pane active" id="tab-plan">
        <div class="form-row">
          <div class="form-group">
            <label>Symbol</label>
            <select id="f-symbol">
              <option value="BTC-PERP">BTC-PERP</option>
              <option value="SOL-PERP">SOL-PERP</option>
              <option value="BTCSOL">BTC/SOL</option>
            </select>
          </div>
          <div class="form-group">
            <label>Direction</label>
            <select id="f-direction">
              <option value="LONG">▲ LONG</option>
              <option value="SHORT">▼ SHORT</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Timeframe</label>
            <select id="f-timeframe">
              <option value="">—</option>
              <option value="1m">1m</option>
              <option value="5m">5m</option>
              <option value="15m">15m</option>
              <option value="30m">30m</option>
              <option value="1h">1h</option>
              <option value="4h">4h</option>
              <option value="1d">1d</option>
            </select>
          </div>
          <div class="form-group">
            <label>Strategy</label>
            <select id="f-strategy">
              <option value="">—</option>
              <option value="ema_cross">EMA Cross</option>
              <option value="rsi_mean_rev">RSI Mean Rev</option>
              <option value="momentum_breakout">Momentum Breakout</option>
              <option value="ratio_zscore">Ratio Z-Score</option>
              <option value="manual">Manual</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Entry Date</label>
            <input type="date" id="f-entry-date" required/>
          </div>
          <div class="form-group">
            <label>Entry Time</label>
            <input type="time" id="f-entry-time"/>
          </div>
        </div>
        <div class="form-row three">
          <div class="form-group">
            <label>Entry Price</label>
            <input type="number" id="f-entry-price" step="any" placeholder="67500"/>
          </div>
          <div class="form-group">
            <label>Stop Loss</label>
            <input type="number" id="f-stop-loss" step="any" placeholder="65000"/>
          </div>
          <div class="form-group">
            <label>Target Price</label>
            <input type="number" id="f-target-price" step="any" placeholder="72000"/>
          </div>
        </div>
        <div class="form-row three">
          <div class="form-group">
            <label>Position Size</label>
            <input type="number" id="f-position-size" step="any" placeholder="0.05 BTC"/>
          </div>
          <div class="form-group">
            <label>Leverage</label>
            <input type="number" id="f-leverage" step="0.5" min="1" placeholder="1"/>
          </div>
          <div class="form-group">
            <label>$ Risked</label>
            <input type="number" id="f-risk-amount" step="any" placeholder="100"/>
          </div>
        </div>
        <div id="rr-preview" class="rr-preview hidden"></div>
        <div class="form-group">
          <label>Thesis <span class="opt">— Why this trade?</span></label>
          <textarea id="f-thesis" rows="3" placeholder="e.g. EMA crossover confirmed on 4h, RSI recovering from oversold, BTC holding key support at 66k…"></textarea>
        </div>
        <div class="form-group">
          <label>Setup Notes <span class="opt">— Technical details</span></label>
          <textarea id="f-setup-notes" rows="2" placeholder="e.g. Volume spike at entry, MACD hist turning positive…"></textarea>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="f-status">
            <option value="planned">📋 Planned</option>
            <option value="open">🟡 Open</option>
            <option value="closed">✅ Closed</option>
            <option value="cancelled">❌ Cancelled</option>
          </select>
        </div>
      </div>

      <!-- ── Tab: Outcome ── -->
      <div class="tab-pane" id="tab-outcome">
        <div class="form-row">
          <div class="form-group">
            <label>Actual Entry Price</label>
            <input type="number" id="f-actual-entry" step="any" placeholder="67480"/>
          </div>
          <div class="form-group">
            <label>Actual Exit Price</label>
            <input type="number" id="f-actual-exit" step="any" placeholder="71200"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Exit Date</label>
            <input type="date" id="f-exit-date"/>
          </div>
          <div class="form-group">
            <label>Exit Time</label>
            <input type="time" id="f-exit-time"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Actual P&amp;L %</label>
            <input type="number" id="f-pnl-pct" step="any" placeholder="auto-calculated"/>
          </div>
          <div class="form-group">
            <label>Actual P&amp;L $</label>
            <input type="number" id="f-pnl-usd" step="any" placeholder="auto-calculated"/>
          </div>
        </div>
        <div class="form-group">
          <label>Exit Reason</label>
          <select id="f-exit-reason">
            <option value="">—</option>
            <option value="target_hit">🎯 Target Hit</option>
            <option value="stop_hit">🛑 Stop Hit</option>
            <option value="manual">✋ Manual Exit</option>
            <option value="cancelled">❌ Cancelled</option>
          </select>
        </div>
        <div id="outcome-preview" class="outcome-preview"></div>
      </div>

      <!-- ── Tab: Analysis ── -->
      <div class="tab-pane" id="tab-analysis">
        <div class="form-group">
          <label>Trade Rating</label>
          <div class="star-rating" id="star-rating">
            <button type="button" data-star="1">★</button>
            <button type="button" data-star="2">★</button>
            <button type="button" data-star="3">★</button>
            <button type="button" data-star="4">★</button>
            <button type="button" data-star="5">★</button>
          </div>
          <input type="hidden" id="f-rating"/>
        </div>
        <div class="form-group">
          <label>Error Category</label>
          <select id="f-error-category">
            <option value="">— Select —</option>
            <option value="good_trade">✅ Good trade — executed plan well</option>
            <option value="fomo">😰 FOMO — chased the move</option>
            <option value="early_exit">⏰ Early exit — left money on table</option>
            <option value="held_too_long">📉 Held too long — ignored exit signal</option>
            <option value="no_stop">🚫 No stop — didn't honor risk rules</option>
            <option value="poor_sizing">⚖️ Poor sizing — too large/small</option>
            <option value="ignored_signal">🙈 Ignored signal — went against strategy</option>
            <option value="overtrading">🔄 Overtrading — forced the trade</option>
            <option value="bad_entry">📍 Bad entry — mistimed entry</option>
            <option value="news_event">📰 News event — unexpected catalyst</option>
          </select>
        </div>
        <div class="form-group">
          <label>Lessons Learned</label>
          <textarea id="f-lessons" rows="5" placeholder="What would you do differently? What did you learn? What worked well?"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" id="cancel-btn">Cancel</button>
        <button type="submit" class="btn-primary">Save Trade</button>
      </div>
    </form>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
